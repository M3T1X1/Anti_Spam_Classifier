<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data analysis</title>
    <link rel="icon" type="image/png" href="{{ url_for('favicon') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
</head>
<body>
    <main class="dashboard-wrapper">
        <header class="dashboard-header">
            <div class="page-heading">
                <div>
                    <h1>Data analysis</h1>
                    <p>Classification summary.</p>
                </div>
                <nav class="top-actions" aria-label="Account navigation">
                    <a href="{{ url_for('dashboard') }}" class="btn btn-analytics">Message history</a>
                    <a href="{{ url_for('logout') }}" class="btn btn-logout">Logout</a>
                </nav>
            </div>
        </header>

        <section class="card analytics-filter-card">
            <form method="get" class="table-controls">
                <div class="control-group">
                    <label for="scope">Data scope</label>
                    <select id="scope" name="scope">
                        <option value="all" {% if scope == 'all' %}selected{% endif %}>All messages</option>
                        <option value="mine" {% if scope == 'mine' %}selected{% endif %}>My messages</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-filter">Update analysis</button>
            </form>
        </section>

        <section class="analytics-summary" aria-label="Message summary">
            <div class="summary-card"><span>Total analyses</span><strong>{{ total_count }}</strong></div>
            <div class="summary-card"><span>HAM</span><strong>{{ ham_count }}</strong></div>
            <div class="summary-card"><span>Not HAM</span><strong>{{ not_ham_count }}</strong></div>
        </section>

        <section class="card chart-card">
            <h2>Message classifications</h2>
            <p>Hover over a bar to see its exact value.</p>
            <div class="chart-container">
                <canvas id="classificationChart" aria-label="Bar chart of message classifications"></canvas>
            </div>
            <div class="export-actions">
                <button type="button" id="exportJpg" class="btn btn-export">Export as JPG</button>
                <button type="button" id="exportPdf" class="btn btn-export">Export as PDF</button>
            </div>
        </section>

        <section class="card chart-card feedback-chart-card">
            <h2>Prediction accuracy</h2>
            <p>User feedback on whether the model classification was correct.</p>
            <div class="chart-container">
                <canvas id="feedbackChart" aria-label="Bar chart of prediction accuracy"></canvas>
            </div>
            <div class="export-actions">
            <button type="button" id="exportFeedbackJpg" class="btn btn-export">Export as JPG</button>
            <button type="button" id="exportFeedbackPdf" class="btn btn-export">Export as PDF</button>
    </div>
        </section>
    </main>

    <script>
    const chart = new Chart(document.getElementById('classificationChart'), {
        type: 'bar',
        data: {
            labels: ['HAM', 'Not HAM'],
            datasets: [{
                label: 'Number of messages',
                data: {{ [ham_count, not_ham_count] | tojson }},
                backgroundColor: ['#10b981', '#ef4444'],
                borderColor: ['#6ee7b7', '#fca5a5'],
                borderWidth: 1,
                borderRadius: 6
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: { callbacks: { label: context => `${context.parsed.y} message(s)` } }
            },
            scales: {
                y: { beginAtZero: true, ticks: { precision: 0, color: '#cbd5e1' }, grid: { color: '#334155' } },
                x: { ticks: { color: '#f8fafc' }, grid: { display: false } }
            }
        }
    });
    const feedbackChart = new Chart(document.getElementById('feedbackChart'), {
        type: 'bar',
        data: {
            labels: ['Correct', 'Incorrect'],
            datasets: [{
                label: 'User feedback',
                data: {{ [correct_count, incorrect_count] | tojson }},
                backgroundColor: ['#10b981', '#ef4444'],
                borderColor: ['#6ee7b7', '#fca5a5'],
                borderWidth: 1,
                borderRadius: 6
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: { callbacks: { label: context => `${context.parsed.y} rating(s)` } }
            },
            scales: {
                y: { beginAtZero: true, ticks: { precision: 0, color: '#cbd5e1' }, grid: { color: '#334155' } },
                x: { ticks: { color: '#f8fafc' }, grid: { display: false } }
            }
        }
    });

    const exportAsJpg = (chartInstance, fileName) => {
        const link = document.createElement('a');
        link.href = chartInstance.toBase64Image('image/jpeg', 1);
        link.download = `${fileName}.jpg`;
        link.click();
    };

    const exportAsPdf = (chartInstance, title, fileName) => {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
        const image = chartInstance.toBase64Image('image/jpeg', 1);
        const pageWidth = pdf.internal.pageSize.getWidth();
        const pageHeight = pdf.internal.pageSize.getHeight();
        const margin = 15;
        const imageWidth = pageWidth - (margin * 2);
        const imageHeight = imageWidth * (chartInstance.height / chartInstance.width);

        pdf.setFontSize(16);
        pdf.text(title, margin, 15);
        pdf.addImage(image, 'JPEG', margin, 25, imageWidth, Math.min(imageHeight, pageHeight - 40));
        pdf.save(`${fileName}.pdf`);
    };

    document.getElementById('exportJpg').addEventListener('click', () => exportAsJpg(chart, 'message-classification-chart'));
    document.getElementById('exportPdf').addEventListener('click', () => exportAsPdf(chart, 'Message classification analysis', 'message-classification-chart'));

    document.getElementById('exportFeedbackJpg').addEventListener('click', () => exportAsJpg(feedbackChart, 'prediction-accuracy-chart'));
    document.getElementById('exportFeedbackPdf').addEventListener('click', () => exportAsPdf(feedbackChart, 'Prediction accuracy analysis', 'prediction-accuracy-chart'));
</script>
</body>
</html>
