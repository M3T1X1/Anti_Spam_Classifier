<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Security Classifier</title>
</head>
<body>
    <div class="main-wrapper">
        <header>
            <h1>Security Classifier</h1>
            <p>Advanced text analysis for threat detection</p>
        </header>

        <section class="card">
            <form method="POST">
                <textarea name="message" placeholder="Paste your message here..." required></textarea>
                <button type="submit">Run Analysis</button>
            </form>

            {% if result %}
                <div class="result-box {{ result }}">
                    <strong>Classification:</strong> {{ result | upper }}
                </div>
            {% endif %}
        </section>
    </div>
</body>
</html>
